<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* --- ESTILOS GENERALES --- */
  body { font-family: 'Roboto', sans-serif; background: #f4f4f9; margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; }
  
  /* Layout */
  .main-container { flex: 1; padding: 20px; overflow-y: auto; }
  .cart-container { width: 350px; background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; box-shadow: -2px 0 10px rgba(0,0,0,0.1); height: 100vh; }
  
  /* GRID DE PRODUCTOS */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
  .card { background: white; border-radius: 10px; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; display: flex; flex-direction: column; justify-content: space-between; }
  .card:hover { border-color: #007bff; }
  .card img { width: 100%; height: 100px; object-fit: contain; margin-bottom: 10px; }
  .card h3 { margin: 5px 0; font-size: 14px; color: #333; height: 35px; overflow: hidden; }
  .price { font-weight: bold; color: #28a745; font-size: 16px; margin-bottom: 5px; }
  .stock { font-size: 11px; color: #888; margin-bottom: 8px; }
  
  /* Controles dentro de la tarjeta */
  .card-controls { display: flex; gap: 5px; align-items: center; justify-content: center; margin-top: 10px; }
  .qty-input { width: 50px; padding: 5px; text-align: center; border: 1px solid #ddd; border-radius: 4px; }
  .btn-add { background: #007bff; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; flex: 1; }
  .btn-add:hover { background: #0056b3; }
  .btn-lamina { background: #17a2b8; width: 100%; margin-top: 10px; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; }

  /* CARRITO */
  .cart-header { padding: 15px; background: #333; color: white; }
  .cart-items { flex: 1; overflow-y: auto; padding: 10px; }
  .cart-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 8px 0; font-size: 13px; }
  .btn-remove { background: none; border: none; cursor: pointer; color: #ff4d4d; font-size: 16px; }
  
  .cart-footer { padding: 15px; background: #f9f9f9; border-top: 1px solid #ddd; }
  .total-row { display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
  
  /* BOTONES DEL CARRITO */
  .btn-pay { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; font-size: 16px; cursor:pointer; font-weight: bold; }
  .btn-pay:hover { background: #218838; }
  .btn-pay:disabled { background: #ccc; }
  
  .btn-quote { width: 100%; padding: 12px; background: #ffc107; color: #333; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
  .btn-quote:hover { background: #e0a800; }

  /* MODAL */
  .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
  .modal-content { background: white; padding: 25px; border-radius: 10px; width: 300px; text-align: center; }
  .modal-btn { padding: 10px; margin: 5px 0; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
  .btn-full { background: #007bff; color: white; }
  .btn-half { background: #17a2b8; color: white; }
  .btn-cancel { background: #ccc; color: #333; }

  /* IMPRESIÓN */
  #ticket-area { display: none; }
  .ticket {
    width: 280px; /* ideal para 80mm */
    font-family: monospace;
    font-size: 12px;
  }

  .ticket-header {
    text-align: center;
  }

  .ticket-logo {
    width: 150px;   /* Ajustable */
    max-width: 100%;
    margin-bottom: 5px;
  }

  .ticket-divider {
    border-top: 1px dashed black;
    margin: 5px 0;
  }

  .ticket-line {
    display: flex;
    justify-content: space-between;
  }

  .ticket-total {
    display: flex;
    justify-content: space-between;
    font-weight: bold;
    font-size: 14px;
    margin-top: 5px;
  }

  .ticket-footer {
    text-align: center;
    margin-top: 10px;
  }

  @media print {
    body > .main-container, body > .cart-container, body > .modal { display: none !important; }
    #ticket-area { 
      display: block; position: absolute; left: 0; top: 0; width: 72mm; 
      font-family: 'Courier New', monospace; font-size: 12px; color: black; 
    }
    @page { margin: 0; }
  }
</style>
</head>
<body>

  <div class="main-container">
    <h2 style="margin-top:0">Ferretería - Catálogo</h2>
    <div id="grid" class="grid">Cargando productos...</div>
  </div>

  <div class="cart-container">
    <div class="cart-header">
      <h3 style="margin:0">🛒 Carrito</h3>
    </div>
    <div id="cart-items" class="cart-items"></div>
    <div class="cart-footer">
      <div class="total-row">
        <span>Total:</span>
        <span id="total-display">$0</span>
      </div>
      <button id="btn-cotizar" class="btn-quote" onclick="procesarCotizacion()">📋 COTIZAR</button>
      <button id="btn-cobrar" class="btn-pay" onclick="procesarVenta()">💰 COBRAR</button>
    </div>
  </div>

  <div id="modal-lamina" class="modal">
    <div class="modal-content">
      <h3>Vender Lámina</h3>
      <p id="modal-prod-name" style="color:#666; margin-bottom:15px"></p>
      <button class="modal-btn btn-full" onclick="addLamina('completa')">Completa - <span id="p-completo"></span></button>
      <button class="modal-btn btn-half" onclick="addLamina('mitad')">Media (1/2) - <span id="p-mitad"></span></button>
      <button class="modal-btn btn-cancel" onclick="closeModal()">Cancelar</button>
    </div>
  </div>

  <div id="ticket-area"></div>

<script>
  let productos = [];
  let config = {};
  let cart = [];
  let productoSeleccionado = null; 
  const toMoney = (n) => '$' + Number(n).toLocaleString('es-CO', {maximumFractionDigits: 0});

  window.onload = () => {
    google.script.run.withSuccessHandler(data => { productos = data; renderGrid(); }).getProductos();
    google.script.run.withSuccessHandler(data => { config = data; }).getConfig();
  };

  function renderGrid() {
  const container = document.getElementById('grid');
  container.innerHTML = '';
  
  productos.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    const imgUrl = p.imagen ? p.imagen : 'https://cdn-icons-png.flaticon.com/512/2652/2652218.png';
    
    let contenidoInterior = `
      <img src="${imgUrl}" alt="${p.nombre}">
      <div>
        <h3>${p.nombre}</h3>
        <div class="price">${toMoney(p.precio)}</div>
        <div class="stock">Stock: ${p.stock}</div>
    `;

    const controlsDiv = document.createElement('div');
    
    if(String(p.tipo).toLowerCase() === 'lamina') {
      const btn = document.createElement('button');
      btn.className = 'btn-lamina';
      btn.innerText = 'Seleccionar';
      btn.onclick = () => abrirModalLamina(p); 
      controlsDiv.appendChild(btn);
    } else {
      controlsDiv.innerHTML = `
        <div class="card-controls">
          <input type="number" id="qty-${p.id}" class="qty-input" value="1" min="1">
          <button class="btn-add">Agregar</button>
        </div>
      `;
      controlsDiv.querySelector('.btn-add').onclick = () => agregarUnidad(p.id);
    }

    card.innerHTML = contenidoInterior;
    card.appendChild(controlsDiv);
    container.appendChild(card);
  });
}

  function agregarUnidad(idProducto) {
    const prod = productos.find(p => p.id === idProducto);
    const inputQty = document.getElementById(`qty-${idProducto}`);
    const cantidad = parseInt(inputQty.value) || 1;

    if(cantidad <= 0) return alert("Cantidad inválida");

    agregarAlCarrito(prod, cantidad, prod.precio * cantidad, 'Unidad', cantidad);
    inputQty.value = 1; 
  }

  function abrirModalLamina(p) {
    productoSeleccionado = p; 
    document.getElementById('modal-prod-name').innerText = p.nombre;
    document.getElementById('p-completo').innerText = toMoney(p.precio);
    document.getElementById('p-mitad').innerText = toMoney(p.precio / 2);
    document.getElementById('modal-lamina').style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal-lamina').style.display = 'none'; productoSeleccionado = null; }

  function addLamina(formato) {
    if(!productoSeleccionado) return;
    let precio = productoSeleccionado.precio;
    let cantInv = 1;
    let desc = 'Completa';
    let qtyVisual = 1;

    if(formato === 'mitad') {
      precio = precio / 2;
      cantInv = 0.5;
      desc = 'Media (1/2)';
    }
    agregarAlCarrito(productoSeleccionado, cantInv, precio, desc, 1);
    closeModal();
  }

  function agregarAlCarrito(producto, cantInventario, precioTotalItem, descripcion, qtyVisualParam){
    let item = cart.find(it => it.id === producto.id && it.desc === descripcion);

    if (item) {
      item.cantidadInv += cantInventario;
      item.cantidadVisual += qtyVisualParam;
      item.subtotal += precioTotalItem;
    } else {
      cart.push({
        id: producto.id,
        nombre: producto.nombre,
        desc: descripcion,
        cantidadInv: cantInventario,
        cantidadVisual: qtyVisualParam, 
        subtotal: precioTotalItem
      });
    }
    renderCarrito();
  }

  function renderCarrito(){
    const el = document.getElementById('cart-items'); 
    el.innerHTML = '';
    let total = 0;
    
    if(cart.length === 0) {
      el.innerHTML = '<div style="text-align:center; padding:30px; color:#aaa;">Carrito Vacío</div>';
      document.getElementById('total-display').innerText = '$0';
      return;
    }

    cart.forEach((it, idx) => {
      total += it.subtotal;
      el.innerHTML += `
        <div class="cart-item">
          <div>
            <strong>${it.nombre}</strong> <span style="color:#007bff; font-weight:bold">(x${it.cantidadVisual})</span><br>
            <span style="color:#666">${it.desc}</span>
          </div>
          <div style="display:flex; align-items:center; gap:10px">
            <strong>${toMoney(it.subtotal)}</strong>
            <button class="btn-remove" onclick="eliminarItem(${idx})">🗑️</button>
          </div>
        </div>`;
    });
    document.getElementById('total-display').innerText = toMoney(total);
  }

  function eliminarItem(index) {
    cart.splice(index, 1);
    renderCarrito();
  }

  // --- NUEVA LÓGICA: PROCESAR COTIZACIÓN ---
  function procesarCotizacion() {
    if(cart.length === 0) return alert("Carrito vacío. Agrega productos para cotizar.");
    
    const totalVenta = cart.reduce((acc, item) => acc + item.subtotal, 0);
    
    // Generamos un ID de ticket temporal y la fecha actual desde el navegador
    const idCotizacion = 'COT-' + Math.random().toString(36).substr(2, 5).toUpperCase();
    const fecha = new Date().toLocaleString('es-CO');
    
    // Llamamos a prepararTicket indicando que SÍ es una cotización (true)
    prepararTicket(cart, totalVenta, idCotizacion, fecha, true);
    window.print();
    
    // Ojo: Dejamos el carrito intacto. Así, si el cliente aprueba la cotización 
    // en el mismo momento, solo tienes que hacer clic en "COBRAR".
  }

  // --- LÓGICA ORIGINAL: PROCESAR VENTA ---
  function procesarVenta() {
    if(cart.length === 0) return alert("Carrito vacío.");
    const btn = document.getElementById('btn-cobrar');
    btn.disabled = true; 
    btn.innerText = "Procesando...";

    const totalVenta = cart.reduce((acc, item) => acc + item.subtotal, 0);
    
    const itemsParaGuardar = cart.map(i => ({ 
      id: i.id, 
      nombre: i.nombre,
      cantidad: i.cantidadInv, 
      cantidadVisual: i.cantidadVisual 
    }));

    const ventaData = { items: itemsParaGuardar, total: totalVenta };

    google.script.run.withSuccessHandler(res => {
      if(res.exito){
        // Llamamos a prepararTicket indicando que NO es una cotización (false)
        prepararTicket(cart, totalVenta, res.id, res.fecha, false);
        window.print();
        
        cart = [];
        renderCarrito();
        google.script.run.withSuccessHandler(d => { productos = d; renderGrid(); }).getProductos();
      } else {
        alert("Error: " + res.error);
      }
      btn.disabled = false;
      btn.innerText = "💰 COBRAR";
    }).registrarVenta(ventaData);
  }
